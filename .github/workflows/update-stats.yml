name: Update Profile Stats

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run stats updater
        env:
          THM_USERNAME: ${{ secrets.THM_USERNAME }}
          HTB_USERNAME: ${{ secrets.HTB_USERNAME }}
          HTB_USER_ID: ${{ secrets.HTB_USER_ID }}
          CD_USERNAME: ${{ secrets.CD_USERNAME }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/update_stats.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "🤖 Auto-update: stats refreshed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
